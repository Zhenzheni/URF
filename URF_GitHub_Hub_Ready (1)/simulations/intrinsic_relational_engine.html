<!DOCTYPE html>
<html lang="en\">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>URF v5.0 · Intrinsic Relational Engine · (1 ≬ 1) ⊢ 3</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #05050a; color: #e6e3d8; font-family: Georgia, serif; }
    canvas { display: block; width: 100%; height: 100%; }
    #hud { position: fixed; top: 20px; left: 20px; background: rgba(5,5,10,0.85); padding: 15px; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; pointer-events: none; font-size: 11px; line-height: 1.6; z-index: 10; font-family: monospace; }
    .highlight { color: #6f8fb5; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<div id="hud">
    <div>FRAMEWORK: <span class="highlight">Unified Relational Framework v5.0</span></div>
    <div>TRANSFORMATION: <span class="highlight">Intrinsic Matrix Chaining (No World Axes)</span></div>
    <div>SCREW CONSTRAINT (&theta;<sub>BC</sub>): <span class="highlight">arccos(-2/3) &approx; 131.81&deg;</span></div>
    <div>GLIDE-HINGE LIFT (&phi;): <span id="phiVal" class="highlight">0.000</span></div>
    <div>OBSERVER MODE: <span class="highlight">Embedded in Cell T_0 Centroid (&mathbin{≬})</span></div>
</div>

<script>
// --- Framework Parameters & Constants ---
const s = 1.0; // Base unit edge scale
const theta_BC = Math.acos(-2 / 3); // Canonical BC screw rotation angle
const H_rise = s / Math.sqrt(10); // Canonical BC translation rise

// State tracking variables
let ST = { t: 0, clock: new THREE.Clock() };
let elementsArray = [];
let totalCells = 30; // The natural 3-sphere geometric near-closure loop threshold

// Setup Three.js Core
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// Minimal environment lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
scene.add(ambientLight);
const pointLight = new THREE.PointLight(0x6f8fb5, 1.5, 50);
pointLight.position.set(5, 5, 5);
scene.add(pointLight);

// --- Custom Geometry Generator: Regular Tetrahedron ---
function createTetrahedronGeometry(scale) {
    const geom = new THREE.BufferGeometry();
    
    // Idealized vertices relative to centroid
    const co = 1.0 / (2.0 * Math.sqrt(2));
    const vertices = new Float32Array([
         scale*co,  scale*co,  scale*co,
        -scale*co, -scale*co,  scale*co,
        -scale*co,  scale*co, -scale*co,
         scale*co, -scale*co, -scale*co
    ]);

    // Face index map (4 faces)
    const indices = [
        0, 1, 2,
        0, 2, 3,
        0, 3, 1,
        1, 3, 2
    ];

    geom.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
    geom.setIndex(indices);
    geom.computeVertexNormals();
    return geom;
}

// Build the physical structural elements matrix
const cellGeom = createTetrahedronGeometry(s);
const baseGroup = new THREE.Group();
scene.add(baseGroup);

for (let i = 0; i < totalCells; i++) {
    // Distinct material per node step to easily track the multi-helical outer strands
    const mat = new THREE.MeshPhongMaterial({
        color: new THREE.Color().setHSL((i / totalCells), 0.5, 0.4),
        wireframe: false,
        flatShading: true,
        transparent: true,
        opacity: 0.85,
        shininess: 30
    });
    
    const mesh = new THREE.Mesh(cellGeom, mat);
    mesh.matrixAutoUpdate = false; // Bypass Three.js automatic world matrix evaluation overrides
    baseGroup.add(mesh);
    elementsArray.push(mesh);
}

// --- The Intrinsic Matrix Engine Calculation ---
function updateRelationalLattice(phi) {
    // Instantiating parent identity frame
    let localFrame = new THREE.Matrix4();
    
    // Dynamically modulate parameters matching localized internal strain changes 
    const dynamicRise = H_rise + (phi * 0.05);
    const dynamicRot = theta_BC + (phi * 0.02);

    // Compound step generator
    const stepMatrix = new THREE.Matrix4();
    const translation = new THREE.Matrix4().makeTranslation(0, 0, dynamicRise);
    const rotation = new THREE.Matrix4().makeRotationZ(dynamicRot);
    
    // Combine local translation and rotation constraints together into a singular relational operator
    stepMatrix.multiplyMatrices(translation, rotation);

    for (let i = 0; i < totalCells; i++) {
        if (i === 0) {
            // Cell T_0 defines our foundational invariant floor system origin
            elementsArray[i].matrix.copy(localFrame);
        } else {
            // Every consecutive cell's position is computed strictly as a derivative relationship to its direct neighbor
            localFrame.multiply(stepMatrix);
            elementsArray[i].matrix.copy(localFrame);
        }
    }
}

// Window resizing adjustments
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Execution Loop ---
function animate() {
    requestAnimationFrame(animate);
    
    let dt = ST.clock.getDelta();
    ST.t += dt;

    // Simulate internal strain changes along the Glide-Hinge Lift (phi) over time 
    // Using a continuous sweep to watch compliance dynamics directly inside the structure
    let phi = Math.sin(ST.t * 0.8) * 0.15;
    document.getElementById('phiVal').innerText = phi.toFixed(4);

    // Update the matrix relationships natively
    updateRelationalLattice(phi);

    // LOCK OBSERVER PARADIGM: Bind the viewing matrix directly to T_0 looking directly inside T_1
    // This turns the camera into an active node processing updates natively within the structure
    let cell_0_Centroid = new THREE.Vector3().setFromMatrixPosition(elementsArray[0].matrix);
    let cell_1_Centroid = new THREE.Vector3().setFromMatrixPosition(elementsArray[1].matrix);
    
    // Place camera directly inside the lens overlap environment of T_0, looking outward up the chain spine
    camera.position.copy(cell_0_Centroid).add(new THREE.Vector3(0, 0, 2.5)); // Offset slightly back along local viewing frame
    camera.lookAt(cell_1_Centroid);

    renderer.render(scene, camera);
}

// Fire engine loop
animate();
</script>

</body>
</html>
